<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merittide — Opportunities</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --ink:#2B1832;
    --paper:#FBF6FA;
    --teal:#D62E7D;
    --gold:#7B3FA0;
    --gray:#8A7F91;
    --line:#EADCE8;
    --card:#FFFFFF;
  }

  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Inter',sans-serif; min-height:100vh;
  }

  .wrap{ max-width:920px; margin:0 auto; padding:64px 24px 100px; }

  .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--teal);
    letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px;
  }
  h1{
    font-family:'Fraunces',serif; font-weight:500;
    font-size:clamp(30px,5vw,44px); margin:0 0 12px; line-height:1.15;
  }
  .subhead{ color:var(--gray); font-size:16px; max-width:520px; margin:0 0 48px; line-height:1.6; }

  .job-list{ display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:20px; }

  .job-card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:28px 26px; cursor:pointer;
    display:flex; flex-direction:column; gap:16px;
    transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  }
  .job-card:hover{
    border-color:var(--teal); transform:translateY(-4px);
    box-shadow:0 12px 28px rgba(43,24,50,0.08);
  }
  .job-main{ display:flex; flex-direction:column; gap:10px; }
  .job-title{ font-family:'Fraunces',serif; font-weight:500; font-size:21px; line-height:1.3; }
  .job-summary{ font-size:14px; color:var(--gray); line-height:1.6; }
  .job-meta{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:2px; }
  .job-code{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gray);
    letter-spacing:.05em;
  }
  .tag{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.05em;
    text-transform:uppercase; padding:4px 10px; border-radius:100px;
    border:1px solid var(--line); color:var(--gray);
  }
  .tag.type-full{ border-color:#3E7C6B55; color:var(--teal); }
  .tag.type-part{ border-color:#C9A45C66; color:#a5793a; }
  .comp{ font-size:14px; color:var(--ink); font-weight:500; }
  .view-link{
    font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.05em;
    color:var(--teal); text-transform:uppercase; margin-top:auto; padding-top:6px;
    display:flex; align-items:center; gap:6px; transition:gap .15s ease;
  }
  .job-card:hover .view-link{ gap:10px; }

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--gray);
    font-family:'Fraunces',serif; font-size:18px;
  }

  /* ---------- detail overlay ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(27,36,48,0.4);
    display:none; align-items:flex-start; justify-content:center;
    padding:40px 20px; overflow-y:auto; z-index:50;
    opacity:0; transition:opacity .25s ease;
  }
  .overlay.open{ display:flex; opacity:1; }

  .detail-panel{
    background:var(--paper); max-width:640px; width:100%;
    border-radius:16px; padding:44px clamp(24px,5vw,56px) 48px;
    position:relative;
    transform:translateY(16px); transition:transform .25s cubic-bezier(.2,.8,.2,1);
  }
  .overlay.open .detail-panel{ transform:translateY(0); }

  .close-btn{
    position:absolute; top:22px; right:24px;
    background:none; border:none; font-size:22px; color:var(--gray);
    cursor:pointer; line-height:1; padding:6px;
  }
  .close-btn:hover{ color:var(--ink); }

  .detail-code{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gray);
    letter-spacing:.08em; text-transform:uppercase; margin-bottom:14px;
  }
  .detail-title{
    font-family:'Fraunces',serif; font-weight:500; font-size:clamp(24px,4vw,32px);
    margin:0 0 16px; line-height:1.2;
  }
  .detail-tags{ display:flex; gap:10px; margin-bottom:26px; flex-wrap:wrap; }
  .detail-comp{
    font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--gray);
    padding:4px 10px; border:1px solid var(--line); border-radius:100px;
  }

  .detail-section{ margin-bottom:26px; }
  .detail-section h3{
    font-family:'IBM Plex Mono',monospace; font-size:12px; text-transform:uppercase;
    letter-spacing:.08em; color:var(--teal); margin:0 0 10px;
  }
  .detail-section p{ font-size:15px; line-height:1.7; color:var(--ink); margin:0; }
  .detail-section ul{ margin:0; padding-left:20px; }
  .detail-section li{ font-size:15px; line-height:1.8; color:var(--ink); }

  .apply-btn{
    display:inline-block; margin-top:8px;
    background:var(--ink); color:var(--paper); text-decoration:none;
    font-family:'Inter',sans-serif; font-weight:600; font-size:15px;
    padding:15px 32px; border-radius:6px;
    transition:background .15s ease, transform .12s ease;
  }
  .apply-btn:hover{ background:var(--teal); }
  .apply-btn:active{ transform:scale(.97); }

  @media (max-width:560px){
    .job-list{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div class="wrap">
  <nav style="display:flex; align-items:center; justify-content:space-between; padding:26px 0 0;">
    <a href="index.html" style="font-family:'Fraunces',serif; font-weight:600; font-size:19px; color:var(--ink); text-decoration:none;">Merittide</a>
    <a href="index.html" style="font-size:14px; color:var(--gray); text-decoration:none;">← Home</a>
  </nav>
  <div class="eyebrow">Careers</div>
  <h1>Opportunities</h1>
  <p class="subhead">Find a meaningful role to match your skills, aspirations, and values. Click any role below to see the full description.</p>

  <div class="job-list" id="jobList"></div>
  <div class="empty-state" id="emptyState" style="display:none;">No open roles right now — check back soon.</div>
</div>

<div class="overlay" id="overlay">
  <div class="detail-panel">
    <button class="close-btn" id="closeBtn">&times;</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — this is the only part you'll ever need to edit.
   Copy an existing job block (the { ... } part) to add a new
   role, or delete a block to take a role down. Keep the commas
   between entries.
   ============================================================ */

// Where your application form lives. Keep this as-is unless you
// move or rename candidate-intake.html.
const APPLICATION_FORM_URL = "candidate-intake.html";

const JOBS = [
  {
    code: "RC-014",
    title: "Backend Engineer",
    type: "full-time",              // "full-time" or "part-time"
    compensation: "$2,000–$3,000/month",
    summary: "Own core API and infrastructure work for a fast-growing SaaS product.",
    description: "You'll work directly with our client's engineering team, building and maintaining backend services that power a B2B SaaS platform used by thousands of businesses. This is a fully remote role on a small, senior team.",
    responsibilities: [
      "Design and build scalable backend services and APIs",
      "Collaborate directly with the client's product and engineering leads",
      "Own code quality, testing, and deployment for your area",
      "Participate in architecture decisions as the product grows"
    ],
    requirements: [
      "3+ years professional backend development experience",
      "Strong experience with Node.js, Python, or Go",
      "Comfortable working async across time zones",
      "Clear written and spoken English"
    ]
  },
  {
    code: "RC-015",
    title: "Product Designer",
    type: "part-time",
    compensation: "$1,200–$1,800/month",
    summary: "Shape the product experience for an early-stage fintech startup.",
    description: "A part-time, flexible-hours role designing user flows, interfaces, and design systems for a small but fast-moving fintech team. Great fit if you want meaningful ownership without full-time hours.",
    responsibilities: [
      "Design end-to-end user flows for new features",
      "Maintain and evolve the product's design system",
      "Run lightweight user research and usability checks",
      "Work closely with a small, senior product team"
    ],
    requirements: [
      "2+ years product design experience, ideally B2C or fintech",
      "Strong portfolio showing end-to-end product thinking",
      "Proficiency in Figma",
      "Available roughly 20 hours/week, overlapping US business hours"
    ]
  }
];

/* ============================================================
   ENGINE — no need to touch anything below this line
   ============================================================ */

const jobList = document.getElementById('jobList');
const emptyState = document.getElementById('emptyState');
const overlay = document.getElementById('overlay');
const detailContent = document.getElementById('detailContent');
const closeBtn = document.getElementById('closeBtn');

function renderJobList(){
  if(JOBS.length === 0){
    emptyState.style.display = 'block';
    return;
  }
  jobList.innerHTML = JOBS.map((job, i) => `
    <div class="job-card" data-index="${i}">
      <div class="job-main">
        <div class="job-code">${job.code}</div>
        <div class="job-title">${job.title}</div>
        <p class="job-summary">${job.summary}</p>
        <div class="job-meta">
          <span class="tag ${job.type === 'full-time' ? 'type-full' : 'type-part'}">${job.type}</span>
          <span class="comp">${job.compensation}</span>
        </div>
      </div>
      <div class="view-link">View role →</div>
    </div>
  `).join('');

  jobList.querySelectorAll('.job-card').forEach(card => {
    card.addEventListener('click', () => openDetail(JOBS[card.dataset.index]));
  });
}

function openDetail(job){
  const applyUrl = `${APPLICATION_FORM_URL}?role=${encodeURIComponent(job.title)}`;
  detailContent.innerHTML = `
    <div class="detail-code">${job.code} · ${job.type}</div>
    <h2 class="detail-title">${job.title}</h2>
    <div class="detail-tags">
      <span class="detail-comp">${job.compensation}</span>
    </div>
    <div class="detail-section">
      <h3>About the role</h3>
      <p>${job.description}</p>
    </div>
    <div class="detail-section">
      <h3>What you'll do</h3>
      <ul>${job.responsibilities.map(r => `<li>${r}</li>`).join('')}</ul>
    </div>
    <div class="detail-section">
      <h3>What we're looking for</h3>
      <ul>${job.requirements.map(r => `<li>${r}</li>`).join('')}</ul>
    </div>
    <a class="apply-btn" href="${applyUrl}">Apply for this role</a>
  `;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail(){
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

closeBtn.addEventListener('click', closeDetail);
overlay.addEventListener('click', e => { if(e.target === overlay) closeDetail(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeDetail(); });

renderJobList();
</script>
</body>
</html>
