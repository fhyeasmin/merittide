<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Intake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --ink:#1B2430;
    --paper:#F7F5F0;
    --teal:#3E7C6B;
    --teal-dim:#3E7C6B33;
    --gold:#C9A45C;
    --gray:#7A8088;
    --line:#DEDAD0;
    --error:#B4533F;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    overflow:hidden;
  }

  /* ---------- top chrome ---------- */
  .topbar{
    position:fixed; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:22px clamp(20px,5vw,56px) 0;
    z-index:10;
  }
  .brand{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--ink);
  }
  .brand span{color:var(--teal);}
  .qcount{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:.06em;
    color:var(--gray);
  }
  .progress-track{
    position:fixed; top:0; left:0; right:0; height:3px;
    background:var(--line); z-index:11;
  }
  .progress-fill{
    height:100%; background:var(--teal);
    width:0%; transition:width .5s cubic-bezier(.65,0,.35,1);
  }

  /* ---------- stage ---------- */
  .stage{
    height:100%;
    display:flex; align-items:center; justify-content:center;
    padding:0 clamp(20px,6vw,120px);
  }
  .step{
    max-width:640px; width:100%;
    position:absolute;
    opacity:0; transform:translateY(24px);
    pointer-events:none;
    transition:opacity .45s ease, transform .45s cubic-bezier(.2,.8,.2,1);
  }
  .step.active{
    opacity:1; transform:translateY(0);
    pointer-events:auto;
    position:relative;
  }
  .step.leaving{
    opacity:0; transform:translateY(-24px);
  }

  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px; color:var(--teal);
    letter-spacing:.1em; text-transform:uppercase;
    margin-bottom:14px;
  }
  .question{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:clamp(24px,4vw,38px);
    line-height:1.25;
    margin:0 0 8px;
  }
  .hint{
    color:var(--gray); font-size:14px; margin:0 0 30px;
  }

  input[type="text"], input[type="email"], input[type="tel"], textarea{
    width:100%;
    border:none; border-bottom:2px solid var(--line);
    background:transparent;
    font-family:'Fraunces',serif;
    font-size:clamp(19px,2.4vw,24px);
    color:var(--ink);
    padding:8px 2px 14px;
    outline:none;
    resize:none;
  }
  textarea{min-height:100px; font-family:'Inter',sans-serif; font-size:17px; line-height:1.5;}
  input:focus, textarea:focus{border-bottom-color:var(--teal);}
  input::placeholder, textarea::placeholder{color:#B9B4A8;}

  .error-msg{
    color:var(--error); font-size:13px; margin-top:10px;
    min-height:16px;
  }

  .pill-group{display:flex; flex-wrap:wrap; gap:10px; margin-top:4px;}
  .pill{
    padding:12px 20px; border:1.5px solid var(--line); border-radius:100px;
    font-size:15px; cursor:pointer; background:transparent; color:var(--ink);
    transition:all .15s ease; font-family:'Inter',sans-serif;
  }
  .pill:hover{border-color:var(--teal);}
  .pill.selected{
    background:var(--ink); border-color:var(--ink); color:var(--paper);
  }

  .controls{
    display:flex; align-items:center; gap:16px; margin-top:36px;
  }
  .btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:15px;
    padding:13px 26px; border-radius:6px; border:none; cursor:pointer;
    transition:transform .12s ease, background .15s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn-next{background:var(--ink); color:var(--paper);}
  .btn-next:hover{background:var(--teal);}
  .btn-back{background:transparent; color:var(--gray); padding:13px 8px;}
  .btn-back:hover{color:var(--ink);}
  .key-hint{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gray);
  }

  /* ---------- confirmation ---------- */
  .done{
    text-align:center; max-width:480px;
  }
  .stamp{
    width:96px; height:96px; margin:0 auto 28px;
    border:2px solid var(--teal); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    transform:rotate(-8deg);
    animation:stampIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes stampIn{
    0%{transform:rotate(-8deg) scale(0);}
    100%{transform:rotate(-8deg) scale(1);}
  }
  .stamp svg{width:44px; height:44px;}
  .done h2{font-family:'Fraunces',serif; font-weight:500; font-size:28px; margin:0 0 10px;}
  .done p{color:var(--gray); font-size:15px; line-height:1.6;}

  .footer-mark{
    position:fixed; bottom:18px; left:0; right:0; text-align:center;
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gray);
    letter-spacing:.04em;
  }

  .role-banner{
    position:fixed; top:38px; left:0; right:0; text-align:center;
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--teal);
    letter-spacing:.08em; text-transform:uppercase; z-index:9;
  }

  /* file upload */
  .file-drop{
    border:1.5px dashed var(--line); border-radius:10px;
    padding:28px 20px; text-align:center; cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .file-drop:hover, .file-drop.dragover{border-color:var(--teal); background:#3E7C6B0d;}
  .file-drop input{display:none;}
  .file-drop-label{font-size:15px; color:var(--gray);}
  .file-drop-label strong{color:var(--ink);}
  .file-chosen{
    margin-top:14px; font-size:14px; color:var(--teal); font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .file-chosen button{
    background:none; border:none; color:var(--gray); cursor:pointer; font-size:13px;
    text-decoration:underline;
  }

  .uploading-overlay{
    position:fixed; inset:0; background:var(--paper);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:20;
  }
  .spinner{
    width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--teal);
    border-radius:50%; animation:spin .8s linear infinite; margin-bottom:18px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .uploading-overlay p{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--gray);}

  .error-screen{text-align:center; max-width:480px;}
  .error-screen h2{font-family:'Fraunces',serif; font-size:24px; color:var(--error); margin-bottom:10px;}
  .error-screen p{color:var(--gray); font-size:14px; margin-bottom:24px;}

  @media (prefers-reduced-motion: reduce){
    .step, .progress-fill, .stamp, .spinner{transition:none; animation:none;}
  }
</style>
</head>
<body>

<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
<div class="topbar">
  <div class="brand" id="brandMark"></div>
  <div class="qcount" id="qcount"></div>
</div>
<div class="role-banner" id="roleBanner"></div>

<div class="stage" id="stage"></div>
<div class="footer-mark">Your information is reviewed by our team only</div>

<script>
/* ============================================================
   CONFIG — edit your agency name and the questions below
   ============================================================ */

// 1. Your agency name, shown top-left
const AGENCY_NAME = "YOUR AGENCY";

// 2. Paste your Google Apps Script Web App URL here (Deploy > Web app)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5MsoggHuLQyt-cUpbLy5INk3LfrhVbiCT8r4aoA7b7iAD7Tsy3-kiHwEBgrMYbGf0/exec";

// 3. Define your questions. Supported types: "text", "email", "tel", "textarea", "select", "file"
const QUESTIONS = [
  { id:"full_name", type:"text", eyebrow:"Let's start with the basics", q:"What's your full name?", placeholder:"Jane Doe", required:true },
  { id:"email", type:"email", eyebrow:"Contact", q:"What's the best email to reach you?", placeholder:"jane@example.com", required:true },
  { id:"linkedin", type:"text", eyebrow:"Profile", q:"Share your LinkedIn profile", placeholder:"linkedin.com/in/...", required:false },
  { id:"resume", type:"file", eyebrow:"Resume", q:"Upload your resume", hint:"PDF or Word doc, up to 5MB", accept:".pdf,.doc,.docx", required:true },
  { id:"portfolio", type:"text", eyebrow:"Portfolio", q:"Share a portfolio or GitHub link", placeholder:"github.com/...", required:false },
  { id:"expected_compensation", type:"text", eyebrow:"Compensation", q:"What's your expected compensation per month?", placeholder:"e.g. $1,500/month", required:true },
  { id:"notice_period", type:"text", eyebrow:"Availability", q:"What's your notice period, in days?", placeholder:"e.g. 30", required:true },
  { id:"intro_link", type:"text", eyebrow:"Introduce yourself", q:"Share a short introduction of yourself in English (audio or video)", hint:"Upload it to Google Drive or any platform of your choice, then paste the link here", placeholder:"https://drive.google.com/...", required:false },
];

// 4. Role is read automatically from the page URL, e.g.
//    candidate-intake.html?role=Backend%20Engineer
// Share a different link (with a different ?role=) for each open position.
const urlParams = new URLSearchParams(window.location.search);
const CURRENT_ROLE = urlParams.get('role') || 'General Application';

/* ============================================================
   ENGINE — no need to touch below this line
   ============================================================ */

const stage = document.getElementById('stage');
const progressFill = document.getElementById('progressFill');
const qcount = document.getElementById('qcount');
let current = 0;
const answers = {};

function renderField(q){
  if(q.type === 'select'){
    return `<div class="pill-group" data-field="${q.id}">
      ${q.options.map(opt => `<button type="button" class="pill" data-value="${opt}">${opt}</button>`).join('')}
    </div>`;
  }
  if(q.type === 'textarea'){
    return `<textarea id="input-${q.id}" placeholder="${q.placeholder||''}">${answers[q.id]||''}</textarea>`;
  }
  if(q.type === 'file'){
    const chosenFile = answers[q.id] && answers[q.id].file;
    return `
      <div class="hint" style="margin-top:-20px; margin-bottom:20px;">${q.hint||''}</div>
      <label class="file-drop" id="dropzone-${q.id}">
        <input type="file" id="input-${q.id}" accept="${q.accept||''}">
        <div class="file-drop-label"><strong>Click to upload</strong> or drag a file here</div>
      </label>
      <div class="file-chosen" id="chosen-${q.id}" style="display:${chosenFile ? 'flex':'none'};">
        <span id="chosen-name-${q.id}">${chosenFile ? chosenFile.name : ''}</span>
        <button type="button" id="clear-${q.id}">remove</button>
      </div>`;
  }
  const numericAttr = q.id === 'notice_period' ? 'inputmode="numeric" pattern="[0-9]*"' : '';
  return `<input type="${q.type}" id="input-${q.id}" placeholder="${q.placeholder||''}" value="${answers[q.id]||''}" ${numericAttr}>`;
}

function renderStep(index, direction){
  const q = QUESTIONS[index];
  const el = document.createElement('div');
  el.className = 'step';
  el.innerHTML = `
    <div class="eyebrow">${q.eyebrow}</div>
    <h1 class="question">${q.q}${q.required ? '' : ' <span style="color:var(--gray);font-weight:400;font-size:0.6em;">(optional)</span>'}</h1>
    <div class="hint">Press Enter to continue</div>
    ${q.hint && q.type !== 'file' ? `<div class="hint" style="margin-top:-20px;">${q.hint}</div>` : ''}
    ${renderField(q)}
    <div class="error-msg" id="error-${q.id}"></div>
    <div class="controls">
      ${index > 0 ? `<button class="btn btn-back" id="backBtn">← Back</button>` : ''}
      <button class="btn btn-next" id="nextBtn">${index === QUESTIONS.length - 1 ? 'Submit' : 'OK'}</button>
      <span class="key-hint">↵</span>
    </div>
  `;
  stage.appendChild(el);
  requestAnimationFrame(()=> el.classList.add('active'));

  // wire up select pills
  if(q.type === 'select'){
    el.querySelectorAll('.pill').forEach(pill => {
      if(pill.dataset.value === answers[q.id]) pill.classList.add('selected');
      pill.addEventListener('click', () => {
        el.querySelectorAll('.pill').forEach(p=>p.classList.remove('selected'));
        pill.classList.add('selected');
        answers[q.id] = pill.dataset.value;
      });
    });
  } else if(q.type === 'file'){
    const fileInput = el.querySelector(`#input-${q.id}`);
    const dropzone = el.querySelector(`#dropzone-${q.id}`);
    const chosenBox = el.querySelector(`#chosen-${q.id}`);
    const chosenName = el.querySelector(`#chosen-name-${q.id}`);
    const clearBtn = el.querySelector(`#clear-${q.id}`);

    const MAX_MB = 5;
    function handleFile(file){
      if(!file) return;
      if(file.size > MAX_MB * 1024 * 1024){
        document.getElementById(`error-${q.id}`).textContent = `That file's a bit large — please keep it under ${MAX_MB}MB.`;
        return;
      }
      document.getElementById(`error-${q.id}`).textContent = '';
      answers[q.id] = { file };
      chosenName.textContent = file.name;
      chosenBox.style.display = 'flex';
      dropzone.style.display = 'none';
    }

    fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });
    clearBtn.addEventListener('click', () => {
      answers[q.id] = null;
      fileInput.value = '';
      chosenBox.style.display = 'none';
      dropzone.style.display = 'flex';
    });
  } else {
    const input = el.querySelector(`#input-${q.id}`);
    input.focus();
    input.addEventListener('input', e => answers[q.id] = e.target.value);
    input.addEventListener('keydown', e => {
      if(e.key === 'Enter' && q.type !== 'textarea'){ e.preventDefault(); goNext(); }
      if(e.key === 'Enter' && e.metaKey && q.type === 'textarea'){ goNext(); }
    });
  }

  el.querySelector('#nextBtn').addEventListener('click', goNext);
  const backBtn = el.querySelector('#backBtn');
  if(backBtn) backBtn.addEventListener('click', goBack);

  updateProgress();
  return el;
}

function updateProgress(){
  progressFill.style.width = `${(current / QUESTIONS.length) * 100}%`;
  qcount.textContent = `Q${current+1} / ${QUESTIONS.length}`;
}

function validate(q){
  const val = answers[q.id];
  if(q.type === 'file'){
    if(q.required && !val){
      document.getElementById(`error-${q.id}`).textContent = "A resume is required to apply.";
      return false;
    }
    return true;
  }
  if(q.required && (!val || !val.trim())){
    document.getElementById(`error-${q.id}`).textContent = "This one's required — mind filling it in?";
    return false;
  }
  if(q.type === 'email' && val && !/^\S+@\S+\.\S+$/.test(val)){
    document.getElementById(`error-${q.id}`).textContent = "That email doesn't look quite right.";
    return false;
  }
  if(q.id === 'notice_period' && val && !/^\d+$/.test(val.trim())){
    document.getElementById(`error-${q.id}`).textContent = "Please enter a number of days, e.g. 30.";
    return false;
  }
  return true;
}

function goNext(){
  const q = QUESTIONS[current];
  if(!validate(q)) return;

  const oldStep = stage.querySelector('.step.active');
  if(current === QUESTIONS.length - 1){
    submitForm();
    return;
  }
  if(oldStep){
    oldStep.classList.remove('active');
    oldStep.classList.add('leaving');
    setTimeout(()=> oldStep.remove(), 450);
  }
  current++;
  renderStep(current);
}

function goBack(){
  const oldStep = stage.querySelector('.step.active');
  if(oldStep){
    oldStep.classList.remove('active');
    setTimeout(()=> oldStep.remove(), 450);
  }
  current--;
  const el = renderStep(current);
  el.style.transform = 'translateY(0)';
}

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]); // strip data: prefix
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function showOverlay(message){
  const overlay = document.createElement('div');
  overlay.className = 'uploading-overlay';
  overlay.id = 'uploadingOverlay';
  overlay.innerHTML = `<div class="spinner"></div><p>${message}</p>`;
  document.body.appendChild(overlay);
}
function removeOverlay(){
  const overlay = document.getElementById('uploadingOverlay');
  if(overlay) overlay.remove();
}

async function submitForm(){
  const oldStep = stage.querySelector('.step.active');
  if(oldStep){ oldStep.classList.remove('active'); setTimeout(()=>oldStep.remove(), 450); }
  progressFill.style.width = '100%';

  showOverlay('Uploading your application…');

  try{
    if(!SCRIPT_URL || !SCRIPT_URL.startsWith('http')){
      throw new Error('SCRIPT_URL is not configured yet.');
    }

    const resumeFile = answers.resume && answers.resume.file;
    const resumeBase64 = resumeFile ? await fileToBase64(resumeFile) : null;

    const payload = {
      role: CURRENT_ROLE,
      full_name: answers.full_name || '',
      email: answers.email || '',
      linkedin: answers.linkedin || '',
      portfolio: answers.portfolio || '',
      expected_compensation: answers.expected_compensation || '',
      notice_period: answers.notice_period || '',
      intro_link: answers.intro_link || '',
      resume: resumeFile ? {
        filename: resumeFile.name,
        mimeType: resumeFile.type || 'application/octet-stream',
        base64: resumeBase64
      } : null,
      submitted_at: new Date().toISOString()
    };

    // Plain-text body avoids a CORS preflight so Apps Script can respond directly.
    const response = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const result = await response.json();

    removeOverlay();
    if(!result.success){ throw new Error(result.error || 'Unknown error from ATS'); }
    renderDone();

  } catch(err){
    console.error('Submission error', err);
    removeOverlay();
    renderError(err.message);
  }
}

function renderDone(){
  const done = document.createElement('div');
  done.className = 'step done active';
  done.innerHTML = `
    <div class="stamp">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3E7C6B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h2>Application received</h2>
    <p>Thank you for applying to <strong>${CURRENT_ROLE}</strong>. Our team reviews every submission personally.<br>If you're selected to move forward, we'll get back to you within 4 weeks of your application.</p>
  `;
  stage.appendChild(done);
  qcount.textContent = '';
}

function renderError(message){
  const errStep = document.createElement('div');
  errStep.className = 'step error-screen active';
  errStep.innerHTML = `
    <h2>Something went wrong</h2>
    <p>Your application didn't go through. This is usually temporary — please try submitting again.<br><span style="font-family:'IBM Plex Mono',monospace;font-size:12px;">${message}</span></p>
    <button class="btn btn-next" id="retryBtn">Try again</button>
  `;
  stage.appendChild(errStep);
  document.getElementById('retryBtn').addEventListener('click', submitForm);
}

// kick off
document.getElementById('brandMark').textContent = AGENCY_NAME;
document.getElementById('roleBanner').textContent = `Applying for: ${CURRENT_ROLE}`;
renderStep(0);
</script>
</body>
</html>
